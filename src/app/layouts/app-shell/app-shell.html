<div class="flex min-h-screen bg-zinc-50">
  <aside
    class="fixed inset-y-0 left-0 z-20 flex flex-col border-r border-zinc-200 bg-white transition-[width] duration-200"
    [class.w-16]="sidebarCollapsed()"
    [class.w-64]="!sidebarCollapsed()"
    aria-label="Primary navigation">
    <div class="flex h-16 items-center border-b border-zinc-200 px-3">
      <a routerLink="/" class="flex items-center gap-2.5 text-zinc-900">
        <span class="grid h-9 w-9 shrink-0 place-items-center rounded-lg bg-brand-600 font-bold text-white">S</span>
        @if (!sidebarCollapsed()) {
          <span class="font-display text-base font-bold tracking-tight">Sonke<span class="text-brand-600">Sports</span></span>
        }
      </a>
    </div>

    <nav class="flex-1 space-y-1 px-2 py-3 text-sm font-medium" aria-label="Sections">
      <a
        routerLink="/dashboard"
        routerLinkActive="bg-brand-50 text-brand-700"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 rounded-md px-3 py-2 text-zinc-700 hover:bg-zinc-100 hover:text-zinc-900">
        <svg class="h-5 w-5 shrink-0" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M10.707 2.293a1 1 0 0 0-1.414 0l-7 7a1 1 0 0 0 1.414 1.414L4 10.414V17a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-4h2v4a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-6.586l.293.293a1 1 0 0 0 1.414-1.414l-7-7Z"/>
        </svg>
        @if (!sidebarCollapsed()) { <span>Dashboard</span> }
      </a>

      @for (item of placeholderNav; track item.label) {
        <button
          type="button"
          aria-disabled="true"
          class="flex w-full cursor-not-allowed items-center gap-3 rounded-md px-3 py-2 text-zinc-400 hover:bg-zinc-50">
          <svg class="h-5 w-5 shrink-0" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path [attr.d]="item.iconPath" />
          </svg>
          @if (!sidebarCollapsed()) {
            <span class="flex-1 text-left">{{ item.label }}</span>
            <span class="rounded bg-zinc-100 px-1.5 py-0.5 text-[10px] font-semibold text-zinc-500">Soon</span>
          }
        </button>
      }
    </nav>

    <div class="border-t border-zinc-200 p-3">
      <button
        type="button"
        aria-disabled="true"
        class="flex w-full cursor-not-allowed items-center gap-3 rounded-md px-3 py-2 text-sm text-zinc-400">
        <svg class="h-5 w-5 shrink-0" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M7.84 1.804A1 1 0 0 1 8.82 1h2.36a1 1 0 0 1 .98.804l.331 1.652a6.993 6.993 0 0 1 1.929 1.115l1.598-.54a1 1 0 0 1 1.186.447l1.18 2.044a1 1 0 0 1-.205 1.251l-1.267 1.113a7.047 7.047 0 0 1 0 2.228l1.267 1.113a1 1 0 0 1 .206 1.251l-1.18 2.044a1 1 0 0 1-1.187.447l-1.598-.54a6.993 6.993 0 0 1-1.929 1.115l-.33 1.652a1 1 0 0 1-.98.804H8.82a1 1 0 0 1-.98-.804l-.331-1.652a6.993 6.993 0 0 1-1.929-1.115l-1.598.54a1 1 0 0 1-1.186-.447l-1.18-2.044a1 1 0 0 1 .205-1.251l1.267-1.114a7.05 7.05 0 0 1 0-2.227L1.821 7.773a1 1 0 0 1-.206-1.25l1.18-2.045a1 1 0 0 1 1.187-.447l1.598.54A6.992 6.992 0 0 1 7.51 3.456l.33-1.652ZM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd" />
        </svg>
        @if (!sidebarCollapsed()) { <span>Settings</span> }
      </button>
    </div>
  </aside>

  <div
    class="flex min-w-0 flex-1 flex-col transition-[margin] duration-200"
    [class.ml-16]="sidebarCollapsed()"
    [class.ml-64]="!sidebarCollapsed()">
    <header class="sticky top-0 z-10 flex h-16 items-center gap-3 border-b border-zinc-200 bg-white px-4 sm:px-6">
      <button
        type="button"
        (click)="toggleSidebar()"
        class="inline-flex h-9 w-9 items-center justify-center rounded-md text-zinc-700 hover:bg-zinc-100"
        [attr.aria-label]="sidebarCollapsed() ? 'Expand sidebar' : 'Collapse sidebar'">
        <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M3 5.75A.75.75 0 0 1 3.75 5h12.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 5.75Zm0 4.5A.75.75 0 0 1 3.75 9.5h12.5a.75.75 0 0 1 0 1.5H3.75a.75.75 0 0 1-.75-.75Zm.75 3.75a.75.75 0 0 0 0 1.5h12.5a.75.75 0 0 0 0-1.5H3.75Z" clip-rule="evenodd" />
        </svg>
      </button>

      <div class="hidden max-w-md flex-1 sm:block">
        <label class="relative block">
          <span class="sr-only">Search</span>
          <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-zinc-400">
            <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" clip-rule="evenodd" />
            </svg>
          </span>
          <input
            type="search"
            placeholder="Search teams, fixtures, news…"
            class="w-full rounded-md border border-zinc-200 bg-zinc-50 py-2 pl-9 pr-3 text-sm placeholder:text-zinc-400 focus:border-brand-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/30" />
        </label>
      </div>

      <div class="ml-auto flex items-center gap-2">
        <button type="button" class="relative inline-flex h-9 w-9 items-center justify-center rounded-md text-zinc-600 hover:bg-zinc-100" aria-label="Notifications">
          <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M10 2a6 6 0 0 0-6 6v3.586l-.707.707A1 1 0 0 0 4 14h12a1 1 0 0 0 .707-1.707L16 11.586V8a6 6 0 0 0-6-6ZM10 18a3 3 0 0 1-3-3h6a3 3 0 0 1-3 3Z" />
          </svg>
          <span class="absolute right-1.5 top-1.5 h-1.5 w-1.5 rounded-full bg-accent-500"></span>
        </button>
        <div class="flex items-center gap-2 rounded-md border border-zinc-200 bg-white py-1 pl-1.5 pr-3">
          <span class="grid h-7 w-7 place-items-center rounded-md bg-brand-600 text-xs font-bold text-white">{{ initials() }}</span>
          <div class="hidden text-xs leading-tight sm:block">
            <p class="font-medium text-zinc-900">{{ currentMember().fullName }}</p>
            <p class="capitalize text-zinc-500">{{ currentMember().roles[0] }}</p>
          </div>
        </div>
      </div>
    </header>

    <main class="flex-1 px-4 py-6 sm:px-6 lg:px-8">
      <router-outlet />
    </main>
  </div>
</div>
